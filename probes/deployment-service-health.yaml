apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: deployment-service-health
  namespace: monitoring
  labels:
    app.kubernetes.io/component: availability-probe
    app.kubernetes.io/part-of: hse-llm-project
    release: kube-prometheus-stack
spec:
  interval: 30s
  module: http_2xx
  prober:
    path: /probe
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      labels:
        service_id: deployment-service
      static:
        - http://deployment-service.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-lifecycle.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-routing.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-inference.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-validation.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-release.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-autoscaler.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-quota.hse-llm-project.svc.cluster.local:8000/health
        - http://deployment-service-cost.hse-llm-project.svc.cluster.local:8000/health
        - http://llmops-deployment-service.hse-llm-project.svc.cluster.local:8000/health
